quarkus.application.name=db-service

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:matchlead}
quarkus.datasource.password=${DB_PASSWORD:matchlead}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/matchlead}
quarkus.hibernate-orm.schema-management.strategy=none
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:db-service;DB_CLOSE_DELAY=-1

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.clean-at-start=true

# Redis
quarkus.redis.hosts=${REDIS_HOSTS:redis://localhost:6379}
%test.quarkus.redis.devservices.enabled=false
%test.quarkus.redis.health.enabled=false

# SmallRye OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
mp.openapi.extensions.smallrye.info.title=MatchLead DB Service API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=API do servico de banco de dados do MatchLead.

# SmallRye Health
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-health.liveness-path=/q/health/live
quarkus.smallrye-health.readiness-path=/q/health/ready
quarkus.smallrye-health.startup-path=/q/health/started

# Metrics
quarkus.micrometer.export.prometheus.path=/q/metrics

# JWT
mp.jwt.verify.issuer=${JWT_ISSUER:matchlead}
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:jwt/publicKey.pem}
smallrye.jwt.sign.key.location=${JWT_SIGN_KEY_LOCATION:jwt/privateKey.pem}
matchlead.jwt.expires-in=${JWT_EXPIRES_IN:3600}
